schema_version: 1

context:
  name: refnx
  version: "0.1.62"
  sha256: 0f9bbb7af14b2a0a585ef77ceaecd07dee45cd3d7f18e5b805fc61812ac19a65
  numpy: "2.0.0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/refnx/refnx/archive/refs/tags/v${{ version }}.zip
  sha256: ${{ sha256 }}
  file_name: refnx-${{ version }}.zip

build:
  number: 1
  skip: match(python, "<3.11")

requirements:
  build:
    - ${{ stdlib("c") }}
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - if: osx
      then: llvm-openmp
    - if: build_platform != target_platform
      then: cross-python_${{ target_platform }}
    - if: build_platform != target_platform
      then: python
    - if: build_platform != target_platform
      then: numpy >=${{ numpy }}
    - if: build_platform != target_platform
      then: cython
    - if: build_platform != target_platform
      then: meson-python
    - if: build_platform != target_platform
      then: ninja
  host:
    - python
    - numpy >=${{ numpy }}
    - cython
    - meson-python
    - ninja
    - pip
    - python-build
    - if: osx
      then: llvm-openmp
  run:
    - python
    - scipy
    - if: osx
      then: llvm-openmp

tests:
  - python:
      imports:
        - refnx
  - requirements:
      run:
        - pytest
        - if: osx and win
          then: pytest-qt
        - scipy >=1.2.0
        - matplotlib
        - ipywidgets
        - traitlets
        - corner
        - tqdm
        - attrs
        - qtpy
        - pyside6
        - periodictable
    script:
      - python -c "import refnx;refnx.test(tests=['refnx.reflect.tests.test_reflect'])"

about:
  license: BSD-3-Clause
  license_file: LICENSE
  summary: Neutron and X-ray Reflectometry Analysis
  homepage: https://github.com/refnx/refnx
  documentation: https://refnx.github.io

extra:
  recipe-maintainers:
    - andyfaff
