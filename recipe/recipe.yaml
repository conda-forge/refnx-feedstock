schema_version: 1

context:
  name: refnx
  version: "0.1.63"
  sha256: 1782542622889ba726138c480e8025ff0bcaca01e553a40792830f2f379f94ec
  numpy: "2.0.0"
  python_min: 3.11

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://files.pythonhosted.org/packages/source/r/refnx/refnx-${{ version }}.tar.gz
  sha256: ${{ sha256 }}

build:
  number: 1
  python_version_independent: true    # [is_abi3]
  skip: True                          # [is_abi3 and not is_python_min]
  script:
    # rattler-build figures out the {.sh,.bat} extensions
    - build

requirements:
  build:
    - ${{ stdlib("c") }}
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - if: osx
      then: llvm-openmp
    - if: build_platform != target_platform
      then:
        - cross-python_${{ target_platform }}
        - python
        - numpy >=${{ numpy }}
        - cython
        - meson-python
        - ninja
  host:
    - python-abi3       # [is_abi3]
    - python
    - numpy >=${{ numpy }}
    - cython
    - meson-python
    - ninja
    - pip
    - python-build
    - if: osx
      then: llvm-openmp
  run:
    - python
    - scipy
    - orsopy
    - if: osx
      then: llvm-openmp

tests:
  - python:
      imports:
        - refnx
  - requirements:
      run:
        - pytest
        - if: osx and win
          then: pytest-qt
        - scipy >=1.2.0
        - matplotlib
        - ipywidgets
        - traitlets
        - corner
        - tqdm
        - attrs
        - qtpy
        - pyside6
        - periodictable
    script:
      - python -c "import refnx;refnx.test(tests=['refnx.reflect.tests.test_reflect'])"

about:
  license: BSD-3-Clause
  license_file: LICENSE
  summary: Neutron and X-ray Reflectometry Analysis
  homepage: https://github.com/refnx/refnx
  documentation: https://refnx.github.io

extra:
  recipe-maintainers:
    - andyfaff
